<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM batch caller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #617080;
      --border: #d7dde4;
      --accent: #1667d9;
      --accent-hover: #0f56b8;
      --danger: #b42318;
      --success: #067647;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100% - 32px, 720px);
      margin: 48px auto;
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 28px;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 22px;
    }

    label {
      font-weight: 650;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    textarea,
    input[type="password"],
    input[type="text"] {
      padding: 11px 12px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 10px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 26px 0;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    #downloadButton {
      display: none;
      background: var(--success);
    }

    #status {
      min-height: 48px;
      margin: 0 0 24px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fbfcfe;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.error {
      border-color: #f1a29b;
      color: var(--danger);
      background: #fff7f6;
    }

    #results {
      display: grid;
      gap: 14px;
    }

    .result {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }

    .result-header {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .prompt,
    .response {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .prompt {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: #334155;
    }

    @media (max-width: 540px) {
      main {
        width: min(100% - 20px, 720px);
        margin: 20px auto;
        padding: 22px;
      }

      h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>LLM batch caller</h1>

    <div class="field">
      <label for="systemPrompt">System prompt</label>
      <textarea id="systemPrompt" placeholder="Paste the system prompt here"></textarea>
    </div>

    <div class="field">
      <label for="promptFile">Prompt file</label>
      <input id="promptFile" type="file" accept=".txt,.csv,.jpg,.jpeg,.png,text/plain,text/csv,image/jpeg,image/png">
      <p class="hint">Use a .txt or .csv file with one prompt per line.</p>
    </div>

    <div class="field">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" type="text" value="http://localhost:1234/v1/chat/completions">
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password">
    </div>

    <div class="field">
      <label for="modelName">Model name</label>
      <input
        id="modelName"
        type="text"
        value="qwen3.5-0.8b"
        placeholder="Text: qwen3.5-0.8b (LM Studio), gemini-2.5-flash (Google AI Studio), meta-llama/llama-3.3-70b-instruct:free (OpenRouter). Image: qwen2.5-vl-7b (LM Studio), qwen/qwen2.5-vl-72b-instruct:free (OpenRouter)"
      >
    </div>

    <div class="actions">
      <button id="runButton" type="button">Run</button>
      <button id="downloadButton" type="button">Download CSV</button>
    </div>

    <div id="status" aria-live="polite">Ready.</div>
    <section id="results" aria-label="Results"></section>
  </main>

  <script>
    const systemPromptInput = document.getElementById("systemPrompt");
    const promptFileInput = document.getElementById("promptFile");
    const apiUrlInput = document.getElementById("apiUrl");
    const apiKeyInput = document.getElementById("apiKey");
    const modelNameInput = document.getElementById("modelName");
    const runButton = document.getElementById("runButton");
    const downloadButton = document.getElementById("downloadButton");
    const statusArea = document.getElementById("status");
    const resultsArea = document.getElementById("results");

    let results = [];

    runButton.addEventListener("click", runBatch);
    downloadButton.addEventListener("click", downloadCsv);

    function setStatus(message, isError = false) {
      statusArea.textContent = message;
      statusArea.classList.toggle("error", isError);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Could not read the selected file."));
        reader.readAsText(file);
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Could not read the selected image."));
        reader.readAsDataURL(file);
      });
    }

    function parseLines(text) {
      return text
        .split(/\r?\n/)
        .filter((line) => line.trim().length > 0);
    }

    function isImageFile(file) {
      return /^image\/(jpeg|png)$/.test(file.type)
        || /\.(jpe?g|png)$/i.test(file.name);
    }

    async function runBatch() {
      const file = promptFileInput.files[0];
      const apiUrl = apiUrlInput.value.trim();
      const apiKey = apiKeyInput.value.trim();
      const model = modelNameInput.value.trim();
      const systemPrompt = systemPromptInput.value;

      results = [];
      resultsArea.textContent = "";
      downloadButton.style.display = "none";
      setStatus("Starting...");

      if (!file) {
        setStatus("Choose a .txt or .csv file first.", true);
        return;
      }

      if (!model) {
        setStatus("Enter a model name.", true);
        return;
      }

      if (!apiUrl) {
        setStatus("Enter an API URL.", true);
        return;
      }

      runButton.disabled = true;
      promptFileInput.disabled = true;
      apiUrlInput.disabled = true;
      apiKeyInput.disabled = true;
      modelNameInput.disabled = true;
      systemPromptInput.disabled = true;

      try {
        if (isImageFile(file)) {
          await runImageRequest(file, apiUrl, apiKey, model, systemPrompt);
          return;
        }

        const fileText = await readFileAsText(file);
        const prompts = parseLines(fileText);

        if (prompts.length === 0) {
          setStatus("The selected file does not contain any prompts.", true);
          return;
        }

        for (let index = 0; index < prompts.length; index += 1) {
          const input = prompts[index];
          setStatus(`Processing row ${index + 1} of ${prompts.length}...`);

          const response = await callLmStudio(apiUrl, apiKey, model, systemPrompt, input);
          const row = {
            row_number: index + 1,
            input,
            response
          };

          results.push(row);
          appendResult(row);
          setStatus(`Processed ${index + 1} of ${prompts.length}.`);
        }

        setStatus(`Done. Processed ${results.length} row${results.length === 1 ? "" : "s"}.`);
        downloadButton.style.display = "inline-block";
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        runButton.disabled = false;
        promptFileInput.disabled = false;
        apiUrlInput.disabled = false;
        apiKeyInput.disabled = false;
        modelNameInput.disabled = false;
        systemPromptInput.disabled = false;
      }
    }

    async function runImageRequest(file, apiUrl, apiKey, model, systemPrompt) {
      setStatus("Processing image...");

      const dataUrl = await readFileAsDataUrl(file);
      const promptText = systemPrompt.trim() || "Transcribe this image as accurately as you can.";
      const response = await callImageModel(apiUrl, apiKey, model, promptText, dataUrl);
      const row = {
        row_number: 1,
        input: file.name,
        response
      };

      results.push(row);
      appendResult(row);
      setStatus("Done. Processed 1 image.");
      downloadButton.style.display = "inline-block";
    }

    async function callLmStudio(apiUrl, apiKey, model, systemPrompt, userPrompt) {
      return sendChatCompletion(apiUrl, apiKey, {
        model,
        stream: false,
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: userPrompt }
        ]
      });
    }

    async function callImageModel(apiUrl, apiKey, model, promptText, dataUrl) {
      return sendChatCompletion(apiUrl, apiKey, {
        model,
        stream: false,
        messages: [
          {
            role: "user",
            content: [
              { type: "text", text: promptText },
              { type: "image_url", image_url: { url: dataUrl } }
            ]
          }
        ]
      });
    }

    async function sendChatCompletion(apiUrl, apiKey, payload) {
      try {
        const headers = {
          "Content-Type": "application/json"
        };

        if (apiKey) {
          headers.Authorization = `Bearer ${apiKey}`;
        }

        const response = await fetch(apiUrl, {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        });

        const bodyText = await response.text();
        let data = null;

        if (bodyText) {
          try {
            data = JSON.parse(bodyText);
          } catch (parseError) {
            throw new Error(`Invalid JSON response: ${bodyText}`);
          }
        }

        if (!response.ok) {
          const apiMessage = data && data.error && (data.error.message || data.error);
          throw new Error(apiMessage || `HTTP ${response.status} ${response.statusText}`);
        }

        const choice = data && data.choices && data.choices[0];
        const content = choice
          && (
            (choice.message && choice.message.content)
            || choice.text
            || ""
          );

        return content == null ? "" : String(content);
      } catch (error) {
        const message = error.message || String(error);
        if (message === "Failed to fetch") {
          return `ERROR: Could not reach the API at ${apiUrl}. Make sure the endpoint is running and CORS is allowed.`;
        }
        return `ERROR: ${message}`;
      }
    }

    function appendResult(row) {
      const wrapper = document.createElement("article");
      wrapper.className = "result";

      const header = document.createElement("p");
      header.className = "result-header";
      header.textContent = `Row ${row.row_number}`;

      const prompt = document.createElement("p");
      prompt.className = "prompt";
      prompt.textContent = row.input;

      const response = document.createElement("p");
      response.className = "response";
      response.textContent = row.response;

      wrapper.append(header, prompt, response);
      resultsArea.appendChild(wrapper);
    }

    function escapeCsvField(value) {
      const text = String(value == null ? "" : value);
      const escaped = text.replace(/"/g, '""');
      return /[",\n\r]/.test(escaped) ? `"${escaped}"` : escaped;
    }

    function downloadCsv() {
      const header = ["row_number", "input", "response"];
      const rows = results.map((row) => [
        row.row_number,
        row.input,
        row.response
      ]);

      const csv = [header, ...rows]
        .map((row) => row.map(escapeCsvField).join(","))
        .join("\r\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "results.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
